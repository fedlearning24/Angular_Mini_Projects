<div class="space-y-5 max-w-xl mx-auto mt-10 p-6 bg-white rounded-2xl shadow-2xl">

    <h1 class="text-2xl font-bold text-center">Notes App</h1>

    <input type="text" (input)="search.set($any($event.target).value)" placeholder="🔍 Search notes..."
        class="w-full p-2 border rounded">

    <div class="flex gap-2">
        <input type="text" #noteInput placeholder="Add note..." class="flex-1 p-2 rounded border">
        <button class="bg-blue-500 px-4 text-white rounded"
            (click)="addNote(noteInput.value); noteInput.value=''">Add</button>
    </div>

    <div class="space-y-2">
        @for(note of filteredNotes(); track note; let i = $index){
        <div class="flex justify-between items-center bg-gray-100 px-4 py-2 rounded-lg">
            <span class="text-gray-700">
                {{note}}
            </span>
            <button class="text-red-500 hover:text-red-700" (click)="deleteNote(i)">X</button>
        </div>
        }
    </div>
</div>
