<div class="max-w-md mx-auto mt-10 p-6 bg-white rounded-2xl shadow-2xl">

    <h2 class="text-xl font-bold mb-4">
        Question {{currentIndex() + 1}}
    </h2>

    <p class="mb-4"> {{currentQuestion().question}} </p>

    <div class="flex flex-col gap-2">
        @for(option of currentQuestion().options; track option){
        <button class="border p-2 rounded hover:bg-gray-100" (click)="answer(option)">{{option}}</button>
        }
    </div>

    @if(finished()){
    <div class="mt-6 text-center">
        <h2 class="text-2xl font-bold">
            Score : {{score()}} / {{questions.length}}
        </h2>
    </div>
    <div class="text-center">
        <button class="mt-4 bg-blue-500 text-white px-4 py-2 rounded" (click)="restart()">Restart</button>
    </div>
    }

</div>
