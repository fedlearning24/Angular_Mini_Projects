<div class="min-h-screen bg-gray-700 flex items-center justify-center">
    <div class="bg-black p-6 rounded-3xl w-40 space-y-4">
        @for(light of lights; track light.color){
        <div class="h-20 w-20 rounded-full mx-auto transition-all duration-500 flex 
                        items-center justify-center text-xl font-bold"
            [class.bg-red-500]="currentLight() === 'red' && light.color === 'red'"
            [class.bg-yellow-500]="currentLight() === 'yellow' && light.color === 'yellow'"
            [class.bg-green-500]="currentLight() === 'green' && light.color === 'green'"
            [class.bg-gray-700]="currentLight() !== light.color" 
            [class.text-white]="light.color !== 'yellow'"
            [class.text-black]="light.color === 'yellow'">
            @if(currentLight() === light.color){
            {{ timer() }}
            }
        </div>
        }
    </div>
</div>
